name: Test and release

# Run the workflow when a Pull Request is opened or when changes are pushed to master on the repo below (i.e. don't run on forks)
on:
  pull_request:
  push:
    branches: [ master ]

# Required secrets:
#   GITHUB_TOKEN             — provided automatically by GitHub
#   NPM_TOKEN                — for semantic-release npm publishing
#   FOUNDRYVTT_RELEASE_TOKEN — FoundryVTT Package Release API authorization token
# Optional secrets:
#   WEBHOOK_URL              — Discord webhook URL for release notifications
permissions:
  contents: read

#Template variables, set as appropriate
env:
  repo_name: xdy/twodsix-foundryvtt
  branch_name: master
  package_type: system
  set_maximum: 'false'       # Whether to set compatibility maximum from manifest (true) or leave unset (false)
  use_submodules: 'false'    # Whether to check out git submodules during build

# Serialize releases to prevent concurrent pushes to the same branch
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/master' && github.repository == 'xdy/twodsix-foundryvtt')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: ${{ env.use_submodules }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: lts/*

      - run: corepack enable

      - run: pnpm install

      - run: pnpm run build

      - name: Lint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run test:unit

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'  && github.repository == 'xdy/twodsix-foundryvtt'

    runs-on: ubuntu-latest
    needs: [ test ]
    timeout-minutes: 20

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: ${{ env.use_submodules }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: lts/*

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Audit (non-blocking)
        run: pnpm audit --prod --audit-level=high
        continue-on-error: true
        timeout-minutes: 5

      - name: Make release script executable
        run: chmod +x ./scripts/release/release.sh

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm exec semantic-release
        timeout-minutes: 10

      - name: Send Webhook Notification
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "WEBHOOK_URL not set, skipping notification"
            exit 0
          fi
          bash scripts/release/discord.sh -- "$WEBHOOK_URL"
        timeout-minutes: 2

      - name: Read manifest values
        id: manifest
        run: |
          echo "id=$(jq -r .id ./dist/${{ env.package_type }}.json)" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r .version ./dist/${{ env.package_type }}.json)" >> "$GITHUB_OUTPUT"
          echo "minimum=$(jq -r '."compatibility"."minimum"' ./dist/${{ env.package_type }}.json)" >> "$GITHUB_OUTPUT"
          echo "verified=$(jq -r '."compatibility"."verified"' ./dist/${{ env.package_type }}.json)" >> "$GITHUB_OUTPUT"
          echo "maximum=$(jq -r '."compatibility"."maximum" // empty' ./dist/${{ env.package_type }}.json)" >> "$GITHUB_OUTPUT"
          echo "package-version=$(jq -r .version ./package.json)" >> "$GITHUB_OUTPUT"
          echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"

      - name: Submit package to FoundryVTT Package Release API
        env:
          MANIFEST_URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.manifest.outputs.tag }}/${{ env.package_type }}.json
          NOTES_URL: https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md
        run: |
          if [ '${{ env.set_maximum }}' = 'true' ]; then
            EFFECTIVE_MAX='${{ steps.manifest.outputs.maximum }}'
          else
            EFFECTIVE_MAX=''
          fi
          PAYLOAD=$(jq -n \
            --arg id '${{ steps.manifest.outputs.id }}' \
            --arg version '${{ steps.manifest.outputs.version }}' \
            --arg manifest "$MANIFEST_URL" \
            --arg notes "$NOTES_URL" \
            --arg minimum '${{ steps.manifest.outputs.minimum }}' \
            --arg verified '${{ steps.manifest.outputs.verified }}' \
            --arg maximum "$EFFECTIVE_MAX" \
            '{
              id: $id,
              "dry-run": false,
              release: {
                version: $version,
                manifest: $manifest,
                notes: $notes,
                compatibility: {
                  minimum: $minimum,
                  verified: $verified,
                  maximum: $maximum
                }
              }
            }')
          curl -X POST "https://foundryvtt.com/_api/packages/release_version/" \
            -H "Content-Type: application/json" \
            -H "Authorization: ${{ secrets.FOUNDRYVTT_RELEASE_TOKEN }}" \
            -d "$PAYLOAD"
        timeout-minutes: 2
